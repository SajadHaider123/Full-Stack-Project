<div class="container mt-5">
    <h2 class="text-center">HR Management System</h2>
    
    <div class="d-flex gap-2 my-4">
        <button class="btn btn-primary" onclick="fetchEmployees()">Show Employees</button>
        <button class="btn btn-success" onclick="fetchDepartments()">Show Departments</button>
    </div>

    <!-- Employees Table -->
    <table class="table table-bordered" id="employees-table" style="display:none;">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="employees-body"></tbody>
    </table>

    <!-- Departments Table -->
    <table class="table table-bordered" id="departments-table" style="display:none;">
        <thead>
            <tr>
                <th>Department</th>
            </tr>
        </thead>
        <tbody id="departments-body"></tbody>
    </table>

    <div id="loading"></div>
</div>

<script src="index.js"></script>
